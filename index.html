.loading-dot {
  display: inline-block; width: 8px; height: 8px; margin-left: 8px;
  background: #2D5F3F; border-radius: 50%;
  -webkit-animation: bounce 0.8s ease-in-out infinite;
  animation: bounce 0.8s ease-in-out infinite;
}
@-webkit-keyframes bounce {
  0%, 100% { -webkit-transform: translateY(0); transform: translateY(0); opacity: 0.6; }
  50% { -webkit-transform: translateY(-4px); transform: translateY(-4px); opacity: 1; }
}
@keyframes bounce {
  0%, 100% { -webkit-transform: translateY(0); transform: translateY(0); opacity: 0.6; }
  50% { -webkit-transform: translateY(-4px); transform: translateY(-4px); opacity: 1; }
}

  max-width: 640px; margin: 60px auto; padding: 28px 32px;
  background: #FBF8F0; border: 1px solid #D9D2C0; border-radius: 12px;
  font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  color: #1B2A1F; box-shadow: 0 12px 28px -18px rgba(45,95,63,0.3);

.app-error .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
.app-error button {
  background: #2D5F3F; color: white; border: 0;
  padding: 10px 18px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: inherit;

<div id="root"><div class="loading"><div>Loading Dairy Nutrition Consult<span class="loading-dot"></span></div><div style="font-size:11px;color:#94A399;margin-top:14px;">If this doesn't load within 5 seconds, click <a href="javascript:void(0)" onclick="window.__diagnose()" style="color:#5BA572;text-decoration:underline;">here</a></div></div></div>

<script>
  (function() {
    var errorShown = false;
    var lastError = null;

    function showError(title, detail, allowReset) {
      if (errorShown) return;
      errorShown = true;
      var resetBtn = allowReset ? '<button onclick="window.__resetAndReload()">Clear data &amp; reload</button>' : '';
      var stack = lastError && lastError.stack ? lastError.stack : (detail || '');
      document.getElementById('root').innerHTML =
        '<div class="app-error">' +
          '<h2>The app didn\'t load</h2>' +
          '<p>' + title + '</p>' +
          (detail ? '<p><code>' + String(detail).replace(/[<>]/g, '') + '</code></p>' : '') +
          '<details><summary>Technical details</summary><pre>' + String(stack).replace(/[<>]/g, '') + '</pre></details>' +
          '<div class="actions">' +
            '<button onclick="location.reload()">Reload page</button>' +
            resetBtn +
          '</div>' +
        '</div>';
    }

    window.__diagnose = function() {
      var diag = [];
      diag.push('User-Agent: ' + navigator.userAgent);
      try { diag.push('localStorage available: ' + (typeof window.localStorage !== 'undefined')); } catch (e) { diag.push('localStorage available: NO (' + e.message + ')'); }
      try { diag.push('Saved call: ' + (window.localStorage.getItem('current-call-v1') ? 'present' : 'none')); } catch (e) { diag.push('localStorage read failed'); }
      diag.push('Last error: ' + (lastError ? (lastError.message || String(lastError)) : 'none'));
      showError('Loaded but app didn\'t mount.', diag.join(' | '), true);
    };

    window.__resetAndReload = function() {
      try { window.localStorage.removeItem('current-call-v1'); } catch (e) {}
      location.reload();
    };

    window.addEventListener('error', function(ev) {
      lastError = ev.error || ev;
      showError('A script error stopped the app from loading.', ev.message || String(ev), true);
    });
    window.addEventListener('unhandledrejection', function(ev) {
      lastError = ev.reason;
      showError('An async error stopped the app from loading.', (ev.reason && ev.reason.message) || String(ev.reason), true);
    });

    setTimeout(function() {
      if (!errorShown) {
        var root = document.getElementById('root');
        if (root && root.querySelector('.loading')) {
          window.__diagnose();
        }
      }
    }, 8000);
  })();
</script>
